<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East European Tennis Academies</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <h1>🎾 East European Tennis Academies</h1>
    <p class="subtitle">Find the perfect academy for your tennis journey</p>
    <button class="btn-wizard" id="btnWizard">🧙 Help Me Choose</button>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-bar-inner">
      <button class="filter-toggle-mobile" id="filterToggle">☰ Filters &amp; Search</button>
      <div class="filter-rows-wrap" id="filterRows">

        <!-- Row 1: Dropdowns + Search -->
        <div class="filter-row">
          <div class="filter-group">
            <label for="filterCountry">Country</label>
            <select id="filterCountry"><option value="">All Countries</option></select>
          </div>
          <div class="filter-group">
            <label for="filterLevel">Level</label>
            <select id="filterLevel">
              <option value="">All Levels</option>
              <option value="Elite">Elite</option>
              <option value="Pro">Pro</option>
              <option value="All levels">All levels</option>
              <option value="Junior">Junior / Dev</option>
              <option value="Recreational">Recreational</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filterSort">Sort</label>
            <select id="filterSort">
              <option value="name">Name</option>
              <option value="country">Country</option>
              <option value="ranking">Best Coach Ranking</option>
              <option value="price">Price (low→high)</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filterSearch">🔍</label>
            <input type="text" id="filterSearch" placeholder="Search academies…">
          </div>
        </div>

        <!-- Row 2: Toggles -->
        <div class="filter-row">
          <div class="view-toggle">
            <button class="toggle-btn active" id="btnListView" data-view="list">📋 List</button>
            <button class="toggle-btn" id="btnMapView" data-view="map">🗺️ Map</button>
          </div>
          <button class="toggle-btn" id="toggleFavorites">❤️ My Shortlist</button>
          <button class="toggle-btn" id="togglePrice" data-filter="price">💰 Has Pricing</button>
          <button class="toggle-btn" id="toggleIndividual" data-filter="individual">✅ Individual Lessons</button>
          <button class="toggle-btn" id="toggleBoarding" data-filter="boarding">🏠 Boarding</button>
          <button class="toggle-btn" id="toggleBeach" data-filter="beach">🏖️ Near Beach</button>
          <button class="toggle-btn" id="toggleATP" data-filter="atp">🎾 Coach Played ATP/WTA</button>
          <button class="toggle-btn" id="toggleTop10" data-filter="top10">🏆 Top-10 Connection</button>
          <button class="btn-reset" id="btnReset">✕ Reset Filters</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Results Count -->
  <div class="results-bar" id="resultsBar">Showing 0 of 0 academies</div>

  <!-- Card Grid -->
  <div class="card-grid" id="cardGrid"></div>

  <!-- Map View -->
  <div class="map-container" id="mapContainer" style="display:none;">
    <div id="leafletMap" style="width:100%;height:100%;"></div>
  </div>

  <!-- Compare Floating Button -->
  <button class="compare-fab" id="compareFab" style="display:none;">Compare (<span id="compareCount">0</span>)</button>

  <!-- Compare Modal -->
  <div class="modal-overlay" id="compareModal" style="display:none;">
    <div class="modal-content modal-compare">
      <div class="modal-header">
        <h2>Compare Academies</h2>
        <button class="modal-close" id="compareClose">&times;</button>
      </div>
      <div class="compare-table-wrap" id="compareTableWrap"></div>
    </div>
  </div>

  <!-- Wizard Modal -->
  <div class="modal-overlay" id="wizardModal" style="display:none;">
    <div class="modal-content modal-wizard">
      <button class="modal-close" id="wizardClose">&times;</button>
      <div class="wizard-container" id="wizardContainer"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Data compiled for informational purposes. Verify details directly with each academy.</p>
    <p><strong>Last updated:</strong> April 2026</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
